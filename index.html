<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo 3D - Autopista Infinita</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; user-select: none; }
        
        #ui { 
            position: absolute; 
            bottom: 30px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            padding: 0 30px; 
            box-sizing: border-box; 
            pointer-events: none; 
        }

        #joystick-container { 
            width: 120px; 
            height: 120px; 
            background: rgba(255,255,255,0.15); 
            border-radius: 50%; 
            border: 3px solid rgba(255,255,255,0.6); 
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            transition: transform 0.05s ease;
        }

        #pedals {
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }
        .btn { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            border: 3px solid white; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-family: Arial, sans-serif;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            touch-action: none;
        }
        #accel { background: rgba(0, 200, 0, 0.6); }
        #accel:active { background: rgba(0, 250, 0, 0.8); }
        #brake { background: rgba(200, 0, 0, 0.6); }
        #brake:active { background: rgba(250, 0, 0, 0.8); }
    </style>
</head>
<body>

<div id="ui">
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="pedals">
        <div id="accel" class="btn">GAS</div>
        <div id="brake" class="btn">FRENO</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xaaccff); 
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(20, 40, 20);
    scene.add(dirLight);

    // --- TEXTURA DE AUTOPISTA PROCEDURAL ---
    const canvasRoad = document.createElement('canvas');
    canvasRoad.width = 512;
    canvasRoad.height = 512;
    const ctxRoad = canvasRoad.getContext('2d');
    
    ctxRoad.fillStyle = '#3c3c3c';
    ctxRoad.fillRect(0, 0, 512, 512);
    
    ctxRoad.fillStyle = '#ffcc00';
    ctxRoad.fillRect(0, 0, 20, 512);
    ctxRoad.fillRect(492, 0, 20, 512);
    
    ctxRoad.fillStyle = '#ffffff';
    for (let i = 0; i < 512; i += 80) {
        ctxRoad.fillRect(250, i + 20, 12, 40);
    }

    const roadTexture = new THREE.CanvasTexture(canvasRoad);
    roadTexture.wrapS = THREE.RepeatWrapping;
    roadTexture.wrapT = THREE.RepeatWrapping;
    roadTexture.repeat.set(1, 15); 

    // Autopista de tamaño controlado (El truco será mover la textura)
    const roadGeo = new THREE.PlaneGeometry(35, 300);
    const roadMat = new THREE.MeshLambertMaterial({map: roadTexture});
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0.01, -100); 
    scene.add(road);

    // Contenedor principal del coche
    const carGroup = new THREE.Group();
    scene.add(carGroup);

    // Contenedor interno para compensar el desvío del modelo .glb
    const carModelOffset = new THREE.Group();
    carGroup.add(carModelOffset);

    const placeholderBody = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshLambertMaterial({color: 0x00ff00}));
    placeholderBody.position.y = 0.5;
    carModelOffset.add(placeholderBody);

    // Letra "Z" flotante centrada perfectamente arriba del grupo
    const canvasZ = document.createElement('canvas');
    canvasZ.width = 128; canvasZ.height = 128;
    const ctxZ = canvasZ.getContext('2d');
    ctxZ.fillStyle = 'rgba(255,255,255,0.9)'; ctxZ.fillRect(0,0,128,128);
    ctxZ.fillStyle = '#cc0000'; ctxZ.font = 'bold 90px Arial'; ctxZ.textAlign = "center"; ctxZ.fillText('Z', 64, 95);
    const zTexture = new THREE.CanvasTexture(canvasZ);
    const zSign = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), new THREE.MeshBasicMaterial({map: zTexture, side: THREE.DoubleSide}));
    zSign.position.set(0, 3.5, 0); 
    carGroup.add(zSign);

    // --- CARGAR TU AUTO.GLB ---
    const loader = new THREE.GLTFLoader();
    loader.load('auto.glb', function(gltf) {
        const importedCar = gltf.scene;
        carModelOffset.remove(placeholderBody); 
        
        importedCar.scale.set(1, 1, 1);
        
        // CORRECCIÓN DE POSICIÓN: Desplazamos el modelo interno hacia la derecha
        // para que sus ruedas queden alineadas con el centro físico del juego
        importedCar.position.set(2.4, 0, 0); 
        
        carModelOffset.add(importedCar);
        console.log("¡Auto cargado y centrado!");
    });

    // Físicas estilo GTA adaptadas para la autopista infinita
    let speed = 0;
    let steer = 0;
    let carX = 0; // Posición lateral del auto en la carretera

    const config = {
        maxSpeed: 0.15,
        reverseMaxSpeed: -0.05,
        accel: 0.003,
        brake: 0.005,
        friction: 0.95,
        steerSpeed: 1.5
    };

    let inputGas = false;
    let inputBrake = false;

    // Lógica del Joystick Táctil
    const joystickContainer = document.getElementById('joystick-container');
    const joystickKnob = document.getElementById('joystick-knob');
    let joystickLeft = 0;

    window.addEventListener('resize', () => {
        const rect = joystickContainer.getBoundingClientRect();
        joystickLeft = rect.left + rect.width / 2;
    });
    window.dispatchEvent(new Event('resize'));

    joystickContainer.addEventListener('touchmove', (e) => {
        const touchX = e.touches[0].clientX;
        let deltaX = touchX - joystickLeft;
        deltaX = Math.max(-40, Math.min(40, deltaX));
        joystickKnob.style.transform = `translateX(${deltaX}px)`;
        steer = deltaX / 40; 
    });

    joystickContainer.addEventListener('touchend', () => {
        joystickKnob.style.transform = `translateX(0px)`;
        steer = 0;
    });

    document.getElementById('accel').addEventListener('touchstart', () => inputGas = true);
    document.getElementById('accel').addEventListener('touchend', () => inputGas = false);
    document.getElementById('brake').addEventListener('touchstart', () => inputBrake = true);
    document.getElementById('brake').addEventListener('touchend', () => inputBrake = false);

    // Ajuste estático de la cámara fija detrás del coche
    camera.position.set(0, 4.5, 9);
    camera.lookAt(0, 1.5, -5);

    function animate() {
        requestAnimationFrame(animate);

        // Aceleración y freno
        if (inputGas) {
            speed += config.accel;
        } else if (inputBrake) {
            speed -= config.brake;
        } else {
            speed *= config.friction;
        }
        speed = THREE.MathUtils.clamp(speed, config.reverseMaxSpeed, config.maxSpeed);

        // Mover el coche de lado a lado en la carretera e inclinarlo al girar (Efecto GTA)
        if (Math.abs(speed) > 0.005) {
            carX += steer * config.steerSpeed * speed;
            // Limitar los bordes para no salirnos del asfalto
            carX = THREE.MathUtils.clamp(carX, -15, 15);
            
            // Rotación fluida en el eje Y al girar
            carGroup.rotation.y = -steer * 0.25 * (speed / config.maxSpeed);
            // Pequeña inclinación (Roll) realista en el eje Z
            carGroup.rotation.z = steer * 0.05;
        } else {
            carGroup.rotation.y *= 0.9;
            carGroup.rotation.z *= 0.9;
        }

        // Aplicamos la posición lateral calculada
        carGroup.position.x = carX;

        // EL TRUCO DEL INFINITO: Desplazamos las coordenadas Y de la textura según la velocidad
        // Esto hace que parezca que avanzas a toda velocidad, ¡pero el suelo nunca se termina!
        roadTexture.offset.y += speed * 2;

        // Mantener la "Z" siempre mirando al frente de la pantalla
        zSign.rotation.y = -carGroup.rotation.y;

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
    </html>
